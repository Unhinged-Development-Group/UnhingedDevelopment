    <script>
        tailwind.config = {
            darkMode: 'class',

    <style>
        @keyframes slideIn {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .toast-enter {
            animation: slideIn 0.3s ease-out forwards;
        }
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        html.dark ::-webkit-scrollbar-thumb:hover { background: #D2ff14; }
        html:not(.dark) ::-webkit-scrollbar-thumb:hover { background: #A8CC00; }
    </style>
</head>
<body class="min-h-screen transition-colors duration-300 font-sans bg-[#f4f4f5] text-black dark:bg-[#0a0a0a] dark:text-white pb-20">

    <div id="toast" class="fixed bottom-6 right-6 z-50 hidden items-center gap-2 bg-zinc-800 text-white px-6 py-3 rounded-xl shadow-2xl shadow-black/50 border border-zinc-700 toast-enter">
        <span id="toast-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>

        </div>
    </header>

                45+ static, procedurally generated icons utilizing chaotic SVG path overlapping to perfectly replicate your brand identity. Click to copy raw SVG code.
            </p>

            <!-- Icons injected by JS -->

        // State variables
        let currentTheme = 'dark'; // Default starting theme

        // UI Icons
        const sunIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>`;
        const moonIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>`;

        // SVG Path generator (Static Chaos Logic)
        function generateUnhingedSVG(paths, mainColor, accentColor, size = 64) {
            const layers = [
                { transform: "translate(0.5, 0.5) rotate(1.5 12 12)", opacity: 0.3, strokeWidth: 1.2, color: mainColor },
                { transform: "translate(-0.5, -0.5) rotate(-1.5 12 12)", opacity: 0.4, strokeWidth: 1, color: mainColor },
                { transform: "translate(1, -0.5) rotate(3 12 12)", opacity: 0.3, strokeWidth: 0.8, color: mainColor },
                { transform: "translate(-1, 1) rotate(-2.5 12 12)", opacity: 0.5, strokeWidth: 1, color: mainColor },
                { transform: "translate(0, 0) rotate(0 12 12)", opacity: 0.9, strokeWidth: 2, color: mainColor },
                { transform: "translate(1.5, 1.5) rotate(-4 12 12)", opacity: 0.8, strokeWidth: 1.5, color: accentColor }
            ];

            let svgContent = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">\n`;

            layers.forEach(layer => {
                svgContent += `  <g transform="${layer.transform}" opacity="${layer.opacity}">\n`;
                paths.forEach(p => {
                    svgContent += `    <path d="${p}" stroke="${layer.color}" stroke-width="${layer.strokeWidth}" />\n`;
                });
                svgContent += `  </g>\n`;
            });

            svgContent += `</svg>`;
            return svgContent;
        }

        // Core Render Function
        function renderIcons() {
            const grid = document.getElementById('icon-grid');
            grid.innerHTML = ''; 
            
            const activeColors = THEMES[currentTheme];
            
            Object.entries(ICON_DATA).forEach(([name, paths]) => {
                const svgString = generateUnhingedSVG(paths, activeColors.main, activeColors.accent, 48); // Scaled to 48px to fit more
                
                const card = document.createElement('div');
                card.className = `flex flex-col items-center justify-between p-4 sm:p-5 rounded-2xl border ${
                    currentTheme === 'dark' 
                        ? 'border-zinc-800/60 bg-zinc-900/40' 
                        : 'border-zinc-200 bg-white'
                }`;

                card.innerHTML = `
                    <div class="mb-4 drop-shadow-lg flex-1 flex items-center justify-center">
                        ${svgString}
                    </div>
                    <div class="w-full flex flex-col items-center gap-3 mt-auto">
                        <h3 class="font-medium tracking-wide text-xs text-center w-full truncate ${currentTheme === 'dark' ? 'text-zinc-300' : 'text-zinc-700'}">
                            ${name}
                        </h3>
                        <button onclick="copyToClipboard(this, '${name}')" class="px-4 py-2 w-full rounded-xl text-xs font-semibold transition-colors active:scale-95 ${
                            currentTheme === 'dark' ? 'bg-zinc-800 hover:bg-zinc-700 text-white border border-zinc-700' : 'bg-zinc-100 hover:bg-zinc-200 text-black border border-zinc-200'
                        }">
                            Copy Code
                        </button>
                    </div>
                `;
                
                // Store SVG string directly on button
                card.querySelector('button').dataset.svg = svgString;
                grid.appendChild(card);
            });
        }

        // Copy Function
        window.copyToClipboard = function(btnElem, name) {
            const text = btnElem.dataset.svg;
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.top = "0";
            textArea.style.left = "0";
            textArea.style.position = "fixed";
            textArea.style.opacity = "0";
            
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            
            try {
                document.execCommand("copy");
                showToast(`Copied "${name}" SVG!`);
            } catch (err) {
                console.error('Unable to copy', err);
            }
            
            document.body.removeChild(textArea);
        };

        // Toast Notification
        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastIcon = document.getElementById('toast-icon');
            
            document.getElementById('toast-message').innerText = message;
            toastIcon.style.color = THEMES[currentTheme].accent;
            toast.style.display = 'flex';
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        // Theme Toggle Logic
        const themeBtn = document.getElementById('theme-btn');
        const themeLabel = document.getElementById('theme-label');
        const titleAccent = document.getElementById('title-accent');
        const htmlEl = document.documentElement;

        function updateThemeUI() {
            const activeColors = THEMES[currentTheme];
            
            if (currentTheme === 'dark') {
                htmlEl.classList.add('dark');
                themeBtn.innerHTML = sunIcon;
                document.getElementById('logo-img').src = 'path2.png'; 
                themeBtn.classList.add('ring-[#D2ff14]');
                themeBtn.classList.remove('ring-[#A8CC00]');
            } else {
                htmlEl.classList.remove('dark');
                themeBtn.innerHTML = moonIcon;
                document.getElementById('logo-img').src = 'IMG_0772_l4ddjj.png';
                themeBtn.classList.remove('ring-[#D2ff14]');
                themeBtn.classList.add('ring-[#A8CC00]');
            }
            
            themeLabel.innerText = activeColors.label;
            themeLabel.style.color = activeColors.accent;
            titleAccent.style.color = activeColors.accent;
            
            renderIcons();
        }

        themeBtn.addEventListener('click', () => {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            updateThemeUI();
        });

        // Initialize application
        updateThemeUI();
    </script>
