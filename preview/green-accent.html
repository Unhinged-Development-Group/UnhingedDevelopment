<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Lime accent</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body {
    width: 700px; min-height: 240px;
    background: #030303;
    font-family: var(--font-sans);
    color: #FAFAFA;
    padding: 24px;
    box-sizing: border-box;
    display: grid;
    grid-template-columns: 1.1fr 0.9fr;
    gap: 22px;
  }
  .group { display: flex; flex-direction: column; gap: 10px; }
  .chip {
    display: flex; align-items: center; gap: 14px;
    padding: 10px 12px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
  }
  .sq { width: 38px; height: 38px; border-radius: 6px; flex: 0 0 38px; }
  .name { font-family: var(--font-mono); font-size: 12px; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: #71717A; }
  .role { font-size: 11px; color: #A1A1AA; margin-top: 2px; }

  .demo {
    background: #080808;
    border: 1px solid #1a1a1a;
    border-radius: 16px;
    padding: 18px;
    display: flex; flex-direction: column; align-items: flex-start; justify-content: space-between;
    gap: 14px;
  }
  .demo .dot {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 11px; color: #D4D4D8;
  }
  .pulse {
    width: 6px; height: 6px; border-radius: 50%;
    background: #D2FF14;
    box-shadow: 0 0 0 0 rgba(210,255,20,0.5);
    animation: p 2s infinite;
  }
  @keyframes p {
    0% { box-shadow: 0 0 0 0 rgba(210,255,20,0.45); }
    70% { box-shadow: 0 0 0 8px rgba(210,255,20,0); }
    100% { box-shadow: 0 0 0 0 rgba(210,255,20,0); }
  }
  .glow {
    font-family: var(--font-display);
    font-weight: 300;
    color: #D2FF14;
    font-size: 32px;
    line-height: 1;
    text-shadow: 0 0 40px rgba(210,255,20,0.45);
  }
  .btn {
    padding: 8px 14px; border-radius: 999px;
    background: linear-gradient(to right, #D2FF14, #A8CC00);
    color: #030303; font-weight: 600; font-size: 12px;
  }
</style>
</head>
<body>
  <div class="group">
    <div class="chip">
      <div class="sq" style="background:#D2FF14"></div>
      <div>
        <div class="name">--unhinged-green</div>
        <div class="hex">#D2FF14</div>
        <div class="role">Primary accent. Selection, focus, status dot, hero glow.</div>
      </div>
    </div>
    <div class="chip">
      <div class="sq" style="background:#E4FF6B"></div>
      <div>
        <div class="name">--unhinged-green-light</div>
        <div class="hex">#E4FF6B</div>
        <div class="role">Hover / brightened text.</div>
      </div>
    </div>
    <div class="chip">
      <div class="sq" style="background:#A8CC00"></div>
      <div>
        <div class="name">--ember</div>
        <div class="hex">#A8CC00</div>
        <div class="role">Gradient stop (the only allowed gradient).</div>
      </div>
    </div>
  </div>

  <div class="demo">
    <div class="glow">Built<br>differently.</div>
    <div class="dot"><span class="pulse"></span>UDG Team Portal</div>
    <div class="btn">Send message →</div>
  </div>
</body>
</html>
