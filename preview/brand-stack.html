<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Brand stack</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body {
    width: 700px; min-height: 260px;
    background: var(--ink-950);
    font-family: var(--font-sans);
    color: var(--fg-1);
    display: flex;
    align-items: stretch;
  }
  .col {
    flex: 1 1 0;
    padding: 24px 22px;
    display: flex; flex-direction: column; justify-content: space-between;
    border-right: 1px solid rgba(255,255,255,0.06);
  }
  .col:last-child { border-right: none; }
  .udg  { background: #030303; color: #FAFAFA; }
  .gr   { background: #F9F8F4; color: #2C3E50; }
  .pp   { background: #FAFAF9; color: #1C1917; }

  .label {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
  }
  .udg .label { color: #D2FF14; }
  .gr  .label { color: #88A096; }
  .pp  .label { color: #7C2D12; font-family: 'Space Mono', monospace; font-weight: 700; letter-spacing: 0.3em; }

  .logo-stage {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    gap: 10px;
    margin: 16px 0;
    min-height: 80px;
  }
  .logo-stage img { display: block; max-width: 100%; height: auto; }

  .role { font-size: 11px; opacity: 0.7; line-height: 1.4; }
  .udg .role { color: #A1A1AA; }
  .gr  .role { color: #88A096; font-family: 'Nunito', sans-serif; font-weight: 600; font-style: italic; }
  .pp  .role { color: #78716C; font-family: 'Montserrat', sans-serif; }

  .swatches { display: flex; gap: 5px; margin-top: 12px; }
  .sw { width: 18px; height: 18px; border-radius: 3px; }
</style>
</head>
<body>
  <div class="col udg">
    <div class="label">Parent</div>
    <div class="logo-stage">
      <img src="../assets/unhinged/chevron-mark-clean.png"
           alt=""
           style="height:42px;width:auto;filter:invert(1) brightness(0.6) sepia(1) saturate(3000%) hue-rotate(35deg) brightness(1.3);mix-blend-mode:screen">
      <img src="../assets/unhinged/wordmark.png"
           alt="Unhinged Development Group"
           style="height:38px;width:auto;filter:invert(1) drop-shadow(0 0 12px rgba(210,255,20,0.4));mix-blend-mode:screen">
    </div>
    <div>
      <div class="role">Built differently.</div>
      <div class="swatches">
        <div class="sw" style="background:#030303;border:1px solid #222"></div>
        <div class="sw" style="background:#D2FF14"></div>
        <div class="sw" style="background:#A8CC00"></div>
        <div class="sw" style="background:#FAFAFA"></div>
      </div>
    </div>
  </div>

  <div class="col gr">
    <div class="label">Portfolio</div>
    <div class="logo-stage">
      <img src="../assets/groomr/horizontal-lockup-deep-slate.png" alt="Groomr" style="height:36px;width:auto">
    </div>
    <div>
      <div class="role">"Your dog deserves a regular."</div>
      <div class="swatches">
        <div class="sw" style="background:#F9F8F4;border:1px solid #d8d6cf"></div>
        <div class="sw" style="background:#2C3E50"></div>
        <div class="sw" style="background:#EAE45C"></div>
        <div class="sw" style="background:#88A096"></div>
        <div class="sw" style="background:#C87964"></div>
      </div>
    </div>
  </div>

  <div class="col pp">
    <div class="label">Portfolio</div>
    <div class="logo-stage" style="flex-direction:column;gap:8px">
      <img src="../assets/paper-and-ponder/monogram.png" alt="" style="height:62px;width:auto">
      <img src="../assets/paper-and-ponder/logo.png" alt="Paper &amp; Ponder" style="height:22px;width:auto">
    </div>
    <div>
      <div class="role">Analogue journaling, brought into modern times.</div>
      <div class="swatches">
        <div class="sw" style="background:#FAFAF9;border:1px solid #e7e5e4"></div>
        <div class="sw" style="background:#1C1917"></div>
        <div class="sw" style="background:#7C2D12"></div>
        <div class="sw" style="background:#FB923C"></div>
      </div>
    </div>
  </div>
</body>
</html>
