<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Eyebrow pattern</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body {
    width: 700px; min-height: 280px;
    background: #030303;
    color: #FAFAFA;
    font-family: 'Inter', system-ui, sans-serif;
    padding: 28px 32px;
    box-sizing: border-box;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 36px;
    align-items: start;
  }
  .group { display: flex; flex-direction: column; gap: 6px; }
  .row { display: flex; align-items: center; gap: 12px; }
  .rule { width: 24px; height: 1px; background: #D2FF14; }

  .eb-inter {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #D2FF14;
  }

  .h1 {
    font-family: 'Bitcount Grid Single', monospace;
    font-weight: 300;
    font-size: 42px;
    line-height: 0.95;
    margin: 8px 0 0;
    color: #FAFAFA;
  }

  .lbl { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #52525B; margin-top: 14px; line-height: 1.5; }
  .lbl b { color: #A1A1AA; font-weight: 500; }
</style>
</head>
<body>
  <div class="group">
    <div class="row">
      <div class="rule"></div>
      <div class="eb-inter">Who we are</div>
    </div>
    <div class="h1">Built<br>differently.</div>
    <div class="lbl">
      <b>Marketing eyebrow</b><br>
      Inter · 500 medium · 12px · 0.2em · uppercase<br>
      Paired with a 24×1px lime rule.
    </div>
  </div>

  <div class="group">
    <div class="row">
      <div class="rule"></div>
      <div class="eb-inter">Secure access</div>
    </div>
    <div style="font-family:'Inter',sans-serif;font-size:24px;font-weight:700;color:#FAFAFA;margin-top:8px">Staff Portal</div>
    <div style="font-size:14px;color:#71717A;margin-top:2px">Access company documents and resources.</div>
    <div class="lbl">
      <b>Portal eyebrow</b><br>
      Same recipe — rule + 0.2em tracking caps<br>
      H1 here is Inter 700, not Bitcount.
    </div>
  </div>
</body>
</html>
