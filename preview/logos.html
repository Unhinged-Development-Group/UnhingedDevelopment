<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Logos & marks</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body {
    width: 700px; min-height: 280px;
    background: #030303;
    color: #FAFAFA;
    font-family: var(--font-sans);
    padding: 24px;
    box-sizing: border-box;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 14px;
  }
  .tile {
    border-radius: 16px;
    padding: 16px 18px 14px;
    display: flex; flex-direction: column; gap: 12px;
    justify-content: space-between;
    min-height: 200px;
    box-sizing: border-box;
  }
  .udg-tile { background: #030303; border: 1px solid #18181B; }
  .gr-tile { background: #F9F8F4; color: #2C3E50; }
  .pp-tile { background: #FAFAF9; color: #1C1917; }
  .stage { flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 8px; }
  .stage img { max-width: 100%; max-height: 100px; height: auto; display: block; }
  .invert { filter: invert(1); mix-blend-mode: screen; }
  .green { filter: invert(1) brightness(0.6) sepia(1) saturate(3000%) hue-rotate(35deg) brightness(1.3); mix-blend-mode: screen; }
  .name { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase; opacity: 0.6; }
  .file { font-family: var(--font-mono); font-size: 9.5px; opacity: 0.45; }
</style>
</head>
<body>
  <div class="tile udg-tile">
    <div class="name" style="color:#D2FF14">UDG · wordmark</div>
    <div class="stage">
      <img src="../assets/unhinged/chevron-mark-clean.png" alt="" class="green" style="height:64px;width:auto">
      <img src="../assets/unhinged/wordmark.png" alt="" class="invert" style="height:60px;width:auto;filter:invert(1) drop-shadow(0 0 14px rgba(210,255,20,0.4));mix-blend-mode:screen">
    </div>
    <div class="file">assets/unhinged/wordmark.png + chevron-mark-clean.png</div>
  </div>

  <div class="tile gr-tile">
    <div class="name" style="color:#88A096">Groomr · lockup</div>
    <div class="stage">
      <img src="../assets/groomr/horizontal-lockup-deep-slate.png" alt="Groomr" style="height:46px;width:auto">
    </div>
    <div class="file" style="color:#88A096">assets/groomr/horizontal-lockup-deep-slate.png</div>
  </div>

  <div class="tile pp-tile">
    <div class="name" style="color:#7C2D12">Paper &amp; Ponder</div>
    <div class="stage" style="flex-direction:column;gap:10px">
      <img src="../assets/paper-and-ponder/monogram.png" alt="" style="height:78px;width:auto">
      <img src="../assets/paper-and-ponder/logo.png" alt="Paper & Ponder" style="height:24px;width:auto">
    </div>
    <div class="file" style="color:#78716C">paper-and-ponder/monogram.png + logo.png</div>
  </div>
</body>
</html>
